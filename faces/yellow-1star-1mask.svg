  <!-- Star on left half -->
  <text x="25" y="50" font-size="48" text-anchor="middle" dominant-baseline="central" font-family="serif" fill="#1a1a1a">★</text>
  <!-- Gas mask on right half, centered at (75, 50), scale 0.6 -->
  <g transform="translate(75,50) scale(0.6)">
    <path d="M 0,-32 C 26,-32 36,-14 32,6 C 28,22 16,24 0,24 C -16,24 -28,22 -32,6 C -36,-14 -26,-32 0,-32 Z" fill="#1a1a1a"/>
    <circle cx="-13" cy="-8" r="9" fill="#f9a825"/>
    <circle cx="13" cy="-8" r="9" fill="#f9a825"/>
    <circle cx="0" cy="33" r="10" fill="#1a1a1a"/>
  </g>
</svg>

