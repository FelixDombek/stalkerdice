<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Yellow die face: one star (left) + one gas mask (right) -->
  <rect width="100" height="100" rx="9" fill="#f9a825"/>
  <!-- Star on left half -->
  <text x="25" y="50" font-size="48" text-anchor="middle" dominant-baseline="central" font-family="serif" fill="#1a1a1a">★</text>
  <!-- Gas mask on right half, centered at (75, 50), scale 0.65 -->
  <g transform="translate(75,50) scale(0.65)">
    <ellipse cx="0" cy="0" rx="32" ry="40" fill="#1a1a1a"/>
    <circle cx="-16" cy="-10" r="11" fill="#f9a825"/>
    <circle cx="16" cy="-10" r="11" fill="#f9a825"/>
    <rect x="-13" y="19" width="26" height="3" rx="1.5" fill="#f9a825" opacity="0.85"/>
    <rect x="-13" y="24" width="26" height="3" rx="1.5" fill="#f9a825" opacity="0.85"/>
    <rect x="-13" y="29" width="26" height="3" rx="1.5" fill="#f9a825" opacity="0.85"/>
  </g>
</svg>
