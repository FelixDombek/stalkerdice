name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

# Needed to deploy to gh-pages and post the preview comment
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: .
