<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c">
      <rect width="512" height="512" rx="80"/>
    </clipPath>
  </defs>
  <g clip-path="url(#c)">
    <!-- Left half: green-die color -->
    <rect width="256" height="512" fill="#2e7d32"/>
    <!-- Right half: yellow-die color -->
    <rect x="256" width="256" height="512" fill="#f9a825"/>
    <!-- White star centered in left half (x = 512/4 = 128) -->
    <text x="128" y="256" font-size="220" text-anchor="middle" dominant-baseline="central" font-family="serif" fill="white">★</text>
    <!-- Gas mask centered in right half (384, 256); scale = 200/64 ≈ 3.125 to fill ~200 px of the 256-wide half -->
    <g transform="translate(384,256) scale(3.125)">
      <!-- Mask body -->
      <ellipse cx="0" cy="0" rx="32" ry="40" fill="#1a1a1a"/>
      <!-- Left goggle lens (shows die background) -->
      <circle cx="-16" cy="-10" r="11" fill="#f9a825"/>
      <!-- Right goggle lens -->
      <circle cx="16" cy="-10" r="11" fill="#f9a825"/>
      <!-- Breathing filter vents -->
      <rect x="-13" y="19" width="26" height="3" rx="1.5" fill="#f9a825" opacity="0.85"/>
      <rect x="-13" y="24" width="26" height="3" rx="1.5" fill="#f9a825" opacity="0.85"/>
      <rect x="-13" y="29" width="26" height="3" rx="1.5" fill="#f9a825" opacity="0.85"/>
    </g>
  </g>
</svg>
