<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Yellow die face: one gas mask -->
  <!-- Pear/skull shaped face piece, circular goggle holes, round filter canister at bottom -->
  <rect width="100" height="100" rx="9" fill="#f9a825"/>
  <!-- Mask centered at (50, 46) -->
  <g transform="translate(50,46)">
    <!-- Pear-shaped face piece: wide dome at top, narrows toward chin -->
    <path d="M 0,-32 C 26,-32 36,-14 32,6 C 28,22 16,24 0,24 C -16,24 -28,22 -32,6 C -36,-14 -26,-32 0,-32 Z" fill="#1a1a1a"/>
    <!-- Left goggle hole (die background shows through) -->
    <circle cx="-13" cy="-8" r="9" fill="#f9a825"/>
    <!-- Right goggle hole -->
    <circle cx="13" cy="-8" r="9" fill="#f9a825"/>
    <!-- Circular filter canister below face piece -->
    <circle cx="0" cy="33" r="10" fill="#1a1a1a"/>
  </g>
</svg>

